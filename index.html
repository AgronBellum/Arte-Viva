<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vela Filmes</title>
    <style>
        :root {
            --primary: #E50914;
            --bg-dark: #0f0f0f;
            --text-primary: #ffffff;
            --text-secondary: #e5e5e5;
            --focus-ring: 0 0 0 4px rgba(255, 255, 255, 0.4);
            --transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg-dark); color: var(--text-primary); overflow: hidden; width: 100vw; height: 100vh; }

        /* ===== HERO SECTION ===== */
        #hero { position: relative; width: 100%; height: 65vh; background-size: cover; background-position: center; display: none; }
        #hero::before { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, var(--bg-dark) 0%, transparent 80%); }
        .hero-content { position: absolute; bottom: 15%; left: 40px; z-index: 2; max-width: 600px; }
        .hero-title { font-size: 52px; font-weight: 800; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .hero-btn { background: white; color: black; padding: 15px 40px; border-radius: 4px; font-weight: 700; border: none; cursor: pointer; font-size: 18px; transition: var(--transition); }
        .hero-btn.focused { background: #d0d0d0; box-shadow: var(--focus-ring); transform: scale(1.05); }

        /* ===== HEADER ===== */
        #header { position: fixed; top: 0; width: 100%; height: 70px; display: flex; align-items: center; padding: 0 40px; z-index: 100; transition: background 0.3s; }
        #header.scrolled { background: var(--bg-dark); }
        .logo { font-size: 28px; font-weight: 900; color: var(--primary); }
        .nav-tabs { display: flex; gap: 20px; margin-left: 30px; }
        .nav-tab { background: none; border: none; color: white; font-weight: 500; cursor: pointer; opacity: 0.7; font-size: 16px; }
        .nav-tab.active { opacity: 1; border-bottom: 2px solid var(--primary); }
        .nav-tab.focused { opacity: 1; transform: scale(1.1); }

        /* ===== GRID/CARDS ===== */
        #main-content { padding: 40px; overflow-y: auto; height: calc(100vh - 70px); }
        .section { margin-bottom: 50px; display: none; }
        .section.active { display: block; }
        .section-title { font-size: 20px; font-weight: 600; margin-bottom: 15px; }
        
        .grid { display: flex; gap: 15px; overflow-x: visible; flex-wrap: wrap; }
        .card { width: 180px; aspect-ratio: 2/3; border-radius: 4px; background: #333; cursor: pointer; transition: var(--transition); flex-shrink: 0; position: relative; }
        .card.focused { transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.8); z-index: 10; border: 2px solid white; }
        .card-img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        
        /* ===== PLAYER ===== */
        #player-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; display: none; }
        #player-overlay.active { display: flex; }
        #player-frame { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 20px; right: 20px; z-index: 600; padding: 10px 20px; background: var(--primary); color: white; border: none; cursor: pointer; }
        .close-btn.focused { box-shadow: var(--focus-ring); }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 1000; display: flex; justify-content: center; align-items: center; color: white; }
    </style>
</head>
<body>

    <div id="loading">Carregando Vela Filmes...</div>

    <div id="header">
        <div class="logo">VELA FILMES</div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-section="home" id="tab-home">Início</button>
            <button class="nav-tab" data-section="movies" id="tab-movies">Filmes</button>
            <button class="nav-tab" data-section="series" id="tab-series">Séries</button>
        </div>
    </div>

    <div id="hero">
        <div class="hero-content">
            <h1 class="hero-title" id="hero-title">Vela Filmes</h1>
            <button class="hero-btn" id="hero-play" tabindex="0">Assistir</button>
        </div>
    </div>

    <div id="main-content">
        <div class="section active" id="section-home"><div class="section-title">Continuar Assistindo</div><div class="grid" id="continue-grid"></div></div>
        <div class="section" id="section-movies"><div class="section-title">Filmes</div><div class="grid" id="movies-grid"></div></div>
        <div class="section" id="section-series"><div class="section-title">Séries</div><div class="grid" id="series-grid"></div></div>
    </div>

    <div id="player-overlay">
        <button class="close-btn" id="player-close" tabindex="0">Fechar</button>
        <iframe id="player-frame" allowfullscreen></iframe>
    </div>

    <script>
        const CONFIG = {
            TMDB_API_KEY: 'cc1b8962568d3627143640b36b75839f',
            FILMES_API: 'https://superflixapi.rest/lista?category=filmes&type=tmdb&format=json&order=asc',
            SERIES_API: 'https://superflixapi.rest/lista?category=serie&type=tmdb&format=json&order=asc'
        };

        const state = { focused: null, currentSection: 'home' };

        // Navegação de Foco (O essencial para TV)
        function updateFocus(nextEl) {
            if(state.focused) state.focused.classList.remove('focused');
            state.focused = nextEl;
            state.focused.classList.add('focused');
            state.focused.focus();
            state.focused.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }

        document.addEventListener('keydown', (e) => {
            const k = e.keyCode;
            if (k === 13) { // Enter
                state.focused.click();
            } else if (k >= 37 && k <= 40) { // Arrows
                // Lógica simples de navegação (pode ser expandida para busca espacial 2D)
                const next = state.focused.nextElementSibling;
                const prev = state.focused.previousElementSibling;
                if ((k === 39 || k === 40) && next) updateFocus(next);
                if ((k === 37 || k === 38) && prev) updateFocus(prev);
            }
        });

        // Fetch básico e render
        async function init() {
            const filmes = await fetch(CONFIG.FILMES_API).then(r => r.json());
            const grid = document.getElementById('movies-grid');
            
            filmes.slice(0, 10).forEach(id => {
                const card = document.createElement('div');
                card.className = 'card';
                card.tabIndex = 0;
                card.innerHTML = `<img class="card-img" src="https://image.tmdb.org/t/p/w500/u3bQlV3h16a3cQ46uM2X3rM7p5P.jpg" alt="Movie">`;
                card.onclick = () => openPlayer(`https://superflixapi.rest/filme/${id}`);
                grid.appendChild(card);
            });
            document.getElementById('loading').style.display = 'none';
            updateFocus(document.querySelector('.card'));
        }

        function openPlayer(url) {
            document.getElementById('player-overlay').classList.add('active');
            document.getElementById('player-frame').src = url;
        }

        document.getElementById('player-close').onclick = () => {
            document.getElementById('player-overlay').classList.remove('active');
            document.getElementById('player-frame').src = '';
        };

        init();
    </script>
</body>
</html>
