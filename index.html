<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arte Viva - Gestão Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .status-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .checkbox-custom { appearance: none; width: 20px; height: 20px; border: 2px solid #d1d5db; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .checkbox-custom:checked { background-color: #10b981; border-color: #10b981; background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e"); background-size: 100%; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-purple-700">Arte Viva</h1>
                <p class="text-gray-500 font-medium">Gerenciador de Encomendas</p>
            </div>
            <div id="syncStatus" class="flex items-center gap-2 px-4 py-2 rounded-full text-xs font-bold bg-gray-100 text-gray-500">
                <span class="w-2.5 h-2.5 bg-gray-400 rounded-full"></span> Verificando...
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <input type="text" id="numIn" placeholder="Nº" class="border p-3 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none">
                <input type="text" id="nomeIn" placeholder="Nome do Cliente" class="md:col-span-2 border p-3 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none">
                <input type="text" id="dataIn" placeholder="Data (Ex: 22/04)" class="border p-3 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none">
            </div>
            <textarea id="itensIn" placeholder="Itens da encomenda (separe por vírgula)" class="w-full border p-3 rounded-xl mb-4 focus:ring-2 focus:ring-purple-500 outline-none h-20"></textarea>
            <button onclick="app.addOrder()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-purple-200">➕ ADICIONAR ENCOMENDA</button>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <input type="text" id="searchIn" onkeyup="app.render()" placeholder="🔍 Pesquisar por nome ou produto..." class="flex-1 border p-3 rounded-xl shadow-sm outline-none focus:border-purple-500">
            <div class="flex gap-2">
                <button onclick="app.generatePDF()" class="bg-gray-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-black transition-all">📄 PDF</button>
                <button onclick="app.loadData()" class="bg-white border border-gray-200 p-3 rounded-xl hover:bg-gray-50">🔄</button>
            </div>
        </div>

        <div id="ordersList" class="space-y-4">
            </div>
    </div>

    <script>
        // CONFIGURAÇÕES GITHUB
        const GITHUB_TOKEN = "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";
        const REPO = "AgronBellum/Arte-Viva";
        const FILE = "encomendas_data.json";
        const API_URL = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

        class EncomendasApp {
            constructor() {
                this.orders = [];
                this.loadData();
            }

            async loadData() {
                this.updateStatus("Sincronizando...", "amber");
                try {
                    // Primeiro tenta ler o arquivo local/direto do repo
                    const response = await fetch(`./${FILE}?t=${Date.now()}`); // Cache bust
                    if (response.ok) {
                        this.orders = await response.json();
                        this.updateStatus("Nuvem Atualizada", "green");
                    } else {
                        // Plano B: API do GitHub
                        const resApi = await fetch(API_URL, {
                            headers: { "Authorization": `token ${GITHUB_TOKEN}` }
                        });
                        const data = await resApi.json();
                        this.orders = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                        this.updateStatus("Via API GitHub", "green");
                    }
                } catch (e) {
                    this.updateStatus("Offline / Erro", "red");
                }
                this.render();
            }

            async saveData() {
                this.updateStatus("Salvando...", "amber");
                try {
                    // Pega o SHA mais recente
                    const res = await fetch(API_URL, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
                    const fileData = await res.json();
                    
                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(this.orders, null, 2))));
                    
                    const putRes = await fetch(API_URL, {
                        method: "PUT",
                        headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            message: `Update via Web App - ${new Date().toLocaleString()}`,
                            content: content,
                            sha: fileData.sha
                        })
                    });

                    if (putRes.ok) {
                        this.updateStatus("Salvo com Sucesso!", "green");
                    }
                } catch (e) {
                    this.updateStatus("Erro ao Salvar", "red");
                }
            }

            updateStatus(text, color) {
                const el = document.getElementById('syncStatus');
                const colors = { green: 'bg-green-50 text-green-600', amber: 'bg-amber-50 text-amber-600', red: 'bg-red-50 text-red-600' };
                const dot = { green: 'bg-green-500', amber: 'bg-amber-500', red: 'bg-red-500' };
                el.className = `flex items-center gap-2 px-4 py-2 rounded-full text-xs font-bold ${colors[color]}`;
                el.innerHTML = `<span class="w-2.5 h-2.5 ${dot[color]} rounded-full status-dot"></span> ${text}`;
            }

            addOrder() {
                const num = document.getElementById('numIn').value;
                const nome = document.getElementById('nomeIn').value;
                const data = document.getElementById('dataIn').value;
                const itens = document.getElementById('itensIn').value;

                if(!num || !nome) return alert("Preencha Nº e Nome!");

                const order = {
                    id: Date.now(),
                    num: num.padStart(2, '0'),
                    name: nome.toUpperCase(),
                    date: data,
                    items: itens.split(',').map(i => i.trim()).filter(i => i),
                    delivered: false
                };

                this.orders.push(order);
                this.orders.sort((a,b) => a.num - b.num);
                this.saveData();
                this.render();
                this.clearInputs();
            }

            toggle(id) {
                const order = this.orders.find(o => o.id === id);
                order.delivered = !order.delivered;
                this.saveData();
                this.render();
            }

            delete(id) {
                if(confirm("Excluir encomenda?")) {
                    this.orders = this.orders.filter(o => o.id !== id);
                    this.saveData();
                    this.render();
                }
            }

            clearInputs() {
                ['numIn', 'nomeIn', 'dataIn', 'itensIn'].forEach(id => document.getElementById(id).value = '');
            }

            render() {
                const search = document.getElementById('searchIn').value.toUpperCase();
                const container = document.getElementById('ordersList');
                container.innerHTML = '';

                const filtered = this.orders.filter(o => 
                    o.name.includes(search) || o.items.some(i => i.toUpperCase().includes(search))
                );

                filtered.forEach(o => {
                    const card = document.createElement('div');
                    card.className = `p-5 rounded-2xl shadow-sm border-2 flex justify-between items-center transition-all ${o.delivered ? 'bg-green-50 border-green-200 opacity-80' : 'bg-white border-transparent'}`;
                    card.innerHTML = `
                        <div class="flex items-center gap-4">
                            <input type="checkbox" ${o.delivered ? 'checked' : ''} onchange="app.toggle(${o.id})" class="checkbox-custom">
                            <div>
                                <h3 class="font-bold text-gray-900"><span class="text-purple-600 mr-1">#${o.num}</span> ${o.name}</h3>
                                <p class="text-sm text-gray-500">${o.items.join(' • ')}</p>
                                <p class="text-xs font-black text-red-500 mt-1">DATA: ${o.date}</p>
                            </div>
                        </div>
                        <button onclick="app.delete(${o.id})" class="p-2 text-gray-300 hover:text-red-500 transition-colors">🗑️</button>
                    `;
                    container.appendChild(card);
                });
            }

            generatePDF() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(20);
                doc.setTextColor(126, 34, 206);
                doc.text("ARTE VIVA - LISTA DE ENCOMENDAS", 15, 20);
                
                doc.setFontSize(10);
                doc.setTextColor(100);
                let y = 35;

                this.orders.filter(o => !o.delivered).forEach(o => {
                    doc.setFont("helvetica", "bold");
                    doc.text(`${o.num} - ${o.name} (Até ${o.date})`, 15, y);
                    doc.setFont("helvetica", "normal");
                    doc.text(`Produtos: ${o.items.join(', ')}`, 15, y + 5);
                    y += 15;
                    if(y > 280) { doc.addPage(); y = 20; }
                });

                doc.save(`arte_viva_${new Date().toLocaleDateString()}.pdf`);
            }
        }

        const app = new EncomendasApp();
    </script>
</body>
</html>
